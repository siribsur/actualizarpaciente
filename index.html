<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualización de Pacientes</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #ff1936; 
            --bg-glass: rgba(255, 255, 255, 0.85);
            --bg-body: #f5f5f7;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --success: #34c759;
            --error: #ff3b30;
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 35px 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.4);
        }

        h2 { font-weight: 600; font-size: 1.7rem; text-align: center; margin-bottom: 8px; letter-spacing: -0.8px; }
        p.subtitle { text-align: center; color: var(--text-sub); font-size: 0.95rem; margin-bottom: 30px; }

        h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--text-sub); margin: 35px 0 15px 0; letter-spacing: 1.2px; display: flex; align-items: center; gap: 10px; }
        h3 i { color: var(--primary); font-size: 1.1rem; }

        .field { margin-bottom: 22px; position: relative; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; margin-left: 4px; color: #48484a; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.main-icon { position: absolute; left: 16px; color: var(--text-sub); font-size: 1rem; pointer-events: none; }
        
        input, select, textarea {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid #d2d2d7;
            border-radius: 14px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.25s ease;
            background: #fff;
            color: var(--text-main);
            outline: none;
            appearance: none;
        }

        .phone-group { display: flex; gap: 8px; }
        .phone-group select { width: 110px; padding-left: 10px; text-align: center; }
        .phone-group input { padding-left: 16px; }

        .capitalize-view { text-transform: capitalize; }

        input:disabled, select:disabled { background: #f0f0f2; color: #8e8e93; border-color: #e5e5ea; cursor: not-allowed; }
        input:focus:not(:disabled), select:focus:not(:disabled), textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 25, 54, 0.15); }
        textarea { padding-left: 48px; min-height: 80px; resize: none; }

        .btn-edit-inline {
            position: absolute;
            right: 0;
            top: -5px;
            background: #f5f5f7;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.9rem;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.2s;
        }
        .btn-edit-inline:hover { background: var(--primary); color: white; transform: scale(1.05); }

        .radio-group { display: flex; gap: 12px; }
        .radio-group label {
            flex: 1; padding: 14px; background: #fff; border: 1.5px solid #d2d2d7; border-radius: 14px;
            text-align: center; cursor: pointer; font-weight: 600; transition: 0.3s; margin: 0; display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        .radio-group input { display: none; }
        .radio-group label:has(input:checked) { background: var(--primary); color: #fff; border-color: var(--primary); }

        button.btn-main {
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px;
            font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.97); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .btn-save { background: var(--success) !important; margin-top: 35px; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3); }

        #save-msg {
            margin-top: 15px; color: var(--success); font-size: 0.9rem; font-weight: 600; text-align: center;
            display: flex; align-items: center; justify-content: center; gap: 8px; opacity: 0; transition: opacity 0.4s ease;
        }
        #save-msg.show { opacity: 1; }

        .hidden { display: none; }
        .fade { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .toggle-pass { position: absolute; right: 16px; color: var(--text-sub); cursor: pointer; font-size: 1rem; }
    </style>
</head>

<div class="app-container fade">
    <div id="login-section">
        <h2>Bienvenido</h2>
        <p class="subtitle">Ingrese los datos para actualizar la ficha médica.</p>
        
        <div class="field">
            <label>Cédula Representante</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-id-card main-icon"></i>
                <input type="text" id="login-dni" placeholder="Ej: 12345678">
            </div>
        </div>
        
        <div class="field">
            <label>N° Historia</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-folder-open main-icon"></i>
                <input type="number" id="login-historia" placeholder="Número de registro">
            </div>
        </div>

        <div class="field">
            <label>Contraseña</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-lock main-icon"></i>
                <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.keyCode==32) return false;">
                <i class="fa-solid fa-eye toggle-pass" id="eye-icon-login" onclick="togglePasswordVisibility('login-pass', 'eye-icon-login')"></i>
            </div>
        </div>

        <button class="btn-main" id="btn-entrar" onclick="validarAcceso()">Entrar <i class="fa-solid fa-arrow-right"></i></button>
        <p id="lock-msg" style="color: var(--error); font-size: 0.8rem; text-align: center; margin-top: 10px;" class="hidden"></p>
    </div>

    <div id="form-section" class="hidden">
        <h2 id="titulo-nombre" class="capitalize-view">Paciente</h2>
        <p class="subtitle">Actualice la información reciente.</p>
        
        <div style="position: relative;">
            <h3><i class="fa-solid fa-user-pen"></i> Identidad del Niño</h3>
            <button class="btn-edit-inline" onclick="habilitarEdicion('nino')" title="Editar datos niño">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
        </div>

        <div class="field">
            <label>Primer Nombre</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user main-icon"></i>
                <input type="text" id="upd-n1" class="capitalize-view group-nino" disabled>
            </div>
        </div>
        <div class="field">
            <label>Segundo Nombre</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user main-icon"></i>
                <input type="text" id="upd-n2" class="capitalize-view group-nino" disabled>
            </div>
        </div>
        <div class="field">
            <label>Primer Apellido</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user-tag main-icon"></i>
                <input type="text" id="upd-a1" class="capitalize-view group-nino" disabled>
            </div>
        </div>
        <div class="field">
            <label>Segundo Apellido</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user-tag main-icon"></i>
                <input type="text" id="upd-a2" class="capitalize-view group-nino" disabled>
            </div>
        </div>

        <div class="field">
            <label>Fecha de Nacimiento</label>

        <div class="field">

            <div class="input-wrapper">
                <i class="fa-solid fa-user main-icon"></i>

        </div>
        <div class="field">

                <input type="text" id="rep-cedula" class="group-rep" disabled>

        </div>

                    <option value="0416">0416</option>

            </div>
        </div>

        <div class="field">
            <label>Cambiar Contraseña (Opcional)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-key main-icon"></i>
                <input type="password" id="upd-new-pass" placeholder="Mantener Actual" onkeydown="if(event.keyCode==32) return false;">

</div>

        "Santa Rita": ["Santa Rita", "El Mene", "Pedro Lucas Urribarrí", "José Cenobio Urribarrí"],
        "Simón Bolívar": ["Manuel Manrique", "Rafael Maria Baralt", "Rafael Urdaneta"],
        "Sucre": ["Bobures", "Gibraltar", "Heras", "Monseñor Arturo Celeste Álvarez", "Rómulo Gallegos", "El Batey"],
        "Valmore Rodríguez": ["Rafael Urdaneta", "La Victoria", "Raúl Cuenca"]
    };

    function aNombrePropio(texto) {
        if (!texto) return "";
        return texto.toLowerCase().split(' ').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ');
    }

    function capitalizarDiagnostico(texto) {
        const conectores = ["de", "del", "la", "en", "el", "y", "a", "por", "e"];
        return texto.toLowerCase().split(' ').map((palabra, index) => {
            if (index > 0 && conectores.includes(palabra)) return palabra;
            return palabra.charAt(0).toUpperCase() + palabra.slice(1);
        }).join(' ');
    }

    function inicializarDiagnosticos() {
        const selectDiag = document.getElementById('upd-diag-p');
        selectDiag.innerHTML = '<option value="">Seleccione Diagnóstico</option>';
        listaDiagnosticos.sort().forEach(diag => {
            const opt = document.createElement('option');
            opt.value = diag.toUpperCase();
            opt.textContent = capitalizarDiagnostico(diag);
            selectDiag.appendChild(opt);
        });
    }

    function togglePasswordVisibility(inputId, iconId) {
        const passInput = document.getElementById(inputId);
        const eyeIcon = document.getElementById(iconId);
        if (passInput.type === "password") {
            passInput.type = "text";
            eyeIcon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = "password";
            eyeIcon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    async function generarHash(password) {
        // Limpiamos espacios por si acaso antes del hash
        const cleanPass = password.replace(/\s/g, '');
        const msgUint8 = new TextEncoder().encode(cleanPass);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function inicializarMunicipios() {
        const selectMun = document.getElementById('upd-mun');
        selectMun.innerHTML = '<option value="">Seleccione Municipio</option>';
        Object.keys(datosZulia).sort().forEach(m => {
            selectMun.innerHTML += `<option value="${m}">${m}</option>`;
        });
    }

    function cargarParroquias() {
        const mun = document.getElementById('upd-mun').value;
        const selectPar = document.getElementById('upd-par');
        selectPar.innerHTML = '';
        if(datosZulia[mun]) {
            datosZulia[mun].sort().forEach(p => {
                selectPar.innerHTML += `<option value="${p}">${p}</option>`;
            });
        }
    }

    function habilitarEdicion(grupo) {
        const clase = grupo === 'nino' ? '.group-nino' : '.group-rep';
        document.querySelectorAll(clase).forEach(el => {
            el.disabled = !el.disabled;
        });
    }

    async function validarAcceso() {
        const dni = document.getElementById('login-dni').value;
        const historia = document.getElementById('login-historia').value;
        // Limpiamos espacios en blanco de la contraseña recibida
        const passRaw = document.getElementById('login-pass').value;
        const passPlana = passRaw.replace(/\s/g, '');

        if(!dni || !historia || !passPlana) return alert("Complete todos los campos.");

        const passHash = await generarHash(passPlana);
        const { data, error } = await supabaseClient.from('pacientes').select('*')
            .eq('dni_padre', dni).eq('id_historia', parseInt(historia)).eq('password', passHash).maybeSingle();

        if (data) {
            pacienteActual = data;
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('form-section').classList.remove('hidden');
            document.getElementById('form-section').classList.add('fade');
            
            document.getElementById('titulo-nombre').innerText = aNombrePropio(`${data.nombre1 || ''} ${data.apellido1 || ''}`);
            
            // Carga Niño
            document.getElementById('upd-n1').value = aNombrePropio(data.nombre1);
            document.getElementById('upd-n2').value = aNombrePropio(data.nombre2);
            document.getElementById('upd-a1').value = aNombrePropio(data.apellido1);
            document.getElementById('upd-a2').value = aNombrePropio(data.apellido2);
            document.getElementById('upd-fecha').value = data.fecha_nacimiento || '';
            document.getElementById('upd-cedula').value = data.cedula_niño || '';
            document.getElementById('upd-genero').value = data.genero ? data.genero.toUpperCase() : 'MASCULINO';
            
            // Carga Representante
            document.getElementById('rep-nombre').value = aNombrePropio(data.nombre_padre);
            document.getElementById('rep-apellido').value = aNombrePropio(data.apellido_padre);
            document.getElementById('rep-cedula').value = data.dni_padre;
            
            if (data.telefono_padre) {
                const telStr = String(data.telefono_padre);
                if (telStr.length > 7) {
                    document.getElementById('rep-cod').value = telStr.slice(0, 4);
                    document.getElementById('rep-num').value = telStr.slice(4);
                } else {
                    document.getElementById('rep-num').value = telStr;
                }
            }

            inicializarMunicipios();
            inicializarDiagnosticos();

            if (data.municipio) {
                const munFormat = Object.keys(datosZulia).find(m => m.toUpperCase() === data.municipio.toUpperCase());
                if(munFormat){
                    document.getElementById('upd-mun').value = munFormat;
                    cargarParroquias();
                    const parFormat = datosZulia[munFormat].find(p => p.toUpperCase() === data.parroquia.toUpperCase());
                    if (parFormat) document.getElementById('upd-par').value = parFormat;
                }
            }
            
            document.getElementById('upd-sec').value = aNombrePropio(data.sector);
            if (data.diagnostico_principal) document.getElementById('upd-diag-p').value = data.diagnostico_principal.toUpperCase();
            document.getElementById('upd-diag-o').value = data.otros_diagnosticos || '';

            marcarRadio('escolarizado', data.escolarizado);
            marcarRadio('fisiatria', data.vio_fisiatria);
            marcarRadio('camina', data.camina_independiente);
            
            if (data.equipo_traslado) document.getElementById('upd-equipo').value = data.equipo_traslado;

            validarEdadManual();
            toggleTraslado();
        } else {
            intentosFallidos++;
            if (intentosFallidos >= 5) bloquearLogin();
            else alert("Datos incorrectos.");
        }
    }

    function bloquearLogin() {
        const btn = document.getElementById('btn-entrar');
        const msg = document.getElementById('lock-msg');
        btn.disabled = true;
        let seg = 60;
        const int = setInterval(() => {
            seg--;
            msg.innerText = `Demasiados intentos. Espere ${seg}s.`;
            msg.classList.remove('hidden');
            if (seg <= 0) { clearInterval(int); btn.disabled = false; msg.classList.add('hidden'); intentosFallidos = 0; }
        }, 1000);
    }

    function marcarRadio(nombre, valor) {
        const radios = document.getElementsByName(nombre);
        for (let r of radios) { if (r.value === String(valor)) r.checked = true; }
    }

    function validarEdadManual() {
        const fecha = document.getElementById('upd-fecha').value;
        if (!fecha) return;
        const edad = new Date().getFullYear() - new Date(fecha).getFullYear();
        document.getElementById('div-cedula').classList.toggle('hidden', edad < 9);
    }

    function toggleTraslado() {
        const caminaRadios = document.querySelector('input[name="camina"]:checked');
        const camina = caminaRadios ? caminaRadios.value === "true" : false;
        const divTraslado = document.getElementById('div-traslado');
        const selectEquipo = document.getElementById('upd-equipo');
        
        if (camina) {
            divTraslado.classList.add('hidden');
        } else {
            divTraslado.classList.remove('hidden');
            if (!selectEquipo.value) selectEquipo.selectedIndex = 0; 
        }
    }

async function guardarDatos() {
    const btn = document.getElementById('btn-guardar');
    const msg = document.getElementById('save-msg');
    
    // Validaciones básicas
    const munVal = document.getElementById('upd-mun').value;
    const parVal = document.getElementById('upd-par').value;
    const diagVal = document.getElementById('upd-diag-p').value;
    const telNum = document.getElementById('rep-num').value;
    
    // Limpiamos espacios en blanco de la nueva contraseña si existiera
    const newPassRaw = document.getElementById('upd-new-pass').value;
    const newPass = newPassRaw.replace(/\s/g, '');

    if(!munVal || !parVal) return alert("Seleccione Municipio y Parroquia");
    if(!diagVal) return alert("Seleccione un Diagnóstico Principal");
    if(telNum.length !== 7) return alert("El número de teléfono debe tener 7 dígitos (sin contar la operadora)");

    btn.disabled = true;
    btn.innerHTML = 'Guardando... <i class="fa-solid fa-spinner fa-spin"></i>';

    const toUpperValue = (id) => {
        const el = document.getElementById(id);
        return el && el.value ? el.value.trim().toUpperCase() : "";
    };

    const caminaRadios = document.querySelector('input[name="camina"]:checked');
    const caminaIndependiente = caminaRadios ? caminaRadios.value === "true" : false;
    let equipoTrasladoFinal = caminaIndependiente ? null : document.getElementById('upd-equipo').value.toUpperCase();

    const telefonoCompleto = document.getElementById('rep-cod').value + telNum;

    const updates = {
        // Niño
        nombre1: toUpperValue('upd-n1'),
        nombre2: toUpperValue('upd-n2'),
        apellido1: toUpperValue('upd-a1'),
        apellido2: toUpperValue('upd-a2'),
        fecha_nacimiento: document.getElementById('upd-fecha').value,
        cedula_niño: document.getElementById('upd-cedula').value,
        genero: document.getElementById('upd-genero').value.toUpperCase(),
        // Representante
        nombre_padre: toUpperValue('rep-nombre'),
        apellido_padre: toUpperValue('rep-apellido'),
        dni_padre: toUpperValue('rep-cedula'),
        telefono_padre: telefonoCompleto,
        // Ubicación / Salud
        municipio: munVal.toUpperCase(),
        parroquia: parVal.toUpperCase(),
        sector: toUpperValue('upd-sec'),
        diagnostico_principal: diagVal.toUpperCase(),
        otros_diagnosticos: toUpperValue('upd-diag-o'),
        vio_fisiatria: document.querySelector('input[name="fisiatria"]:checked').value === "true",
        camina_independiente: caminaIndependiente,
        escolarizado: document.querySelector('input[name="escolarizado"]:checked').value === "true",
        equipo_traslado: equipoTrasladoFinal,
        actualizado: true,
        ultima_edicion: new Date()
    };

    // Solo si el usuario escribió algo (después de limpiar espacios)
    if (newPass !== "") {
        updates.password = await generarHash(newPass);
    }

    const { error } = await supabaseClient.from('pacientes').update(updates).eq('id_historia', pacienteActual.id_historia);

    if (!error) { 
        msg.classList.add('show');
        btn.disabled = false;
        btn.innerHTML = 'Guardar Cambios <i class="fa-solid fa-cloud-arrow-up"></i>';
        
        document.getElementById('titulo-nombre').innerText = aNombrePropio(`${updates.nombre1} ${updates.apellido1}`);
        
        // Bloquear campos de edición manual tras guardar
        document.querySelectorAll('.group-nino, .group-rep').forEach(el => el.disabled = true);
        
        // Limpiar campo de nueva contraseña
        document.getElementById('upd-new-pass').value = "";
        
        // Formatear visualmente
        document.getElementById('rep-nombre').value = aNombrePropio(updates.nombre_padre);
        document.getElementById('rep-apellido').value = aNombrePropio(updates.apellido_padre);
        
        setTimeout(() => msg.classList.remove('show'), 5000);
    } else { 
        alert("Error al guardar: " + error.message);
        btn.disabled = false;
        btn.innerHTML = 'Guardar Cambios <i class="fa-solid fa-cloud-arrow-up"></i>';
    }
}
</script>
