<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualización de Pacientes - Gestión Segura</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --primary: #ff1936; 
            --bg-glass: rgba(255, 255, 255, 0.85);
            --bg-body: #f5f5f7;
            --text-main: #1d1d1f;
            --text-sub: #86868b;
            --success: #34c759;
            --error: #ff3b30;
            --radius: 24px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: var(--radius);
            padding: 35px 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            border: 1px solid rgba(255,255,255,0.4);
        }

        h2 { font-weight: 600; font-size: 1.7rem; text-align: center; margin-bottom: 8px; letter-spacing: -0.8px; }
        p.subtitle { text-align: center; color: var(--text-sub); font-size: 0.95rem; margin-bottom: 30px; }

        h3 { font-size: 0.8rem; text-transform: uppercase; color: var(--text-sub); margin: 35px 0 15px 0; letter-spacing: 1.2px; display: flex; align-items: center; gap: 10px; }
        h3 i { color: var(--primary); font-size: 1.1rem; }

        .field { margin-bottom: 22px; position: relative; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 8px; margin-left: 4px; color: #48484a; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.main-icon { position: absolute; left: 16px; color: var(--text-sub); font-size: 1rem; pointer-events: none; }
        
        input, select, textarea {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 1.5px solid #d2d2d7;
            border-radius: 14px;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: all 0.25s ease;
            background: #fff;
            color: var(--text-main);
            outline: none;
            appearance: none;
        }

        .phone-group { display: flex; gap: 8px; }
        .phone-group select { width: 110px; padding-left: 10px; text-align: center; }
        .phone-group input { padding-left: 16px; }

        .capitalize-view { text-transform: capitalize; }

        input:disabled, select:disabled { background: #f0f0f2; color: #8e8e93; border-color: #e5e5ea; cursor: not-allowed; }
        input:focus:not(:disabled), select:focus:not(:disabled), textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 25, 54, 0.15); }
        textarea { padding-left: 48px; min-height: 80px; resize: none; }

        .btn-edit-inline {
            position: absolute;
            right: 0;
            top: -5px;
            background: #f5f5f7;
            border: 1px solid #d2d2d7;
            border-radius: 8px;
            color: var(--primary);
            cursor: pointer;
            font-size: 0.9rem;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: all 0.2s;
        }
        .btn-edit-inline:hover { background: var(--primary); color: white; transform: scale(1.05); }

        .radio-group { display: flex; gap: 12px; }
        .radio-group label {
            flex: 1; padding: 14px; background: #fff; border: 1.5px solid #d2d2d7; border-radius: 14px;
            text-align: center; cursor: pointer; font-weight: 600; transition: 0.3s; margin: 0; display: flex; justify-content: center; align-items: center; gap: 6px;
        }
        .radio-group input { display: none; }
        .radio-group label:has(input:checked) { background: var(--primary); color: #fff; border-color: var(--primary); }

        button.btn-main {
            width: 100%; padding: 18px; background: var(--primary); color: white; border: none; border-radius: 16px;
            font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px;
        }
        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.97); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        
        .btn-save { background: var(--success) !important; margin-top: 35px; box-shadow: 0 4px 15px rgba(52, 199, 89, 0.3); }
        .btn-exit { background: #86868b !important; margin-top: 15px; }

        #toast-container {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            width: 90%;
            max-width: 380px;
        }
        .toast {
            background: #333;
            color: white;
            padding: 16px 20px;
            border-radius: 16px;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            animation: slideUp 0.4s ease forwards;
            font-size: 0.95rem;
        }
        .toast.error { background: #ff3b30; }
        .toast.success { background: #34c759; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .hidden { display: none; }
        .fade { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        
        .toggle-pass { position: absolute; right: 16px; color: var(--text-sub); cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

<div id="toast-container"></div>

<div class="app-container fade">
    <div id="login-section">
        <h2>Bienvenido</h2>
        <p class="subtitle">Ingrese los datos para actualizar la ficha médica.</p>
        
        <form id="login-form" onsubmit="event.preventDefault(); validarAcceso();">
            <div class="field">
                <label>Cédula Representante</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-id-card main-icon"></i>
                    <input type="text" id="login-dni" placeholder="Ej: 12345678" required autocomplete="username">
                </div>
            </div>
            
            <div class="field">
                <label>N° Historia</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-folder-open main-icon"></i>
                    <input type="number" id="login-historia" placeholder="Número de registro" required>
                </div>
            </div>

            <div class="field">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock main-icon"></i>
                    <input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.keyCode==32) return false;" required autocomplete="current-password">
                    <i class="fa-solid fa-eye toggle-pass" id="eye-icon-login" onclick="togglePasswordVisibility('login-pass', 'eye-icon-login')"></i>
                </div>
            </div>

            <button type="submit" class="btn-main" id="btn-entrar">
                Entrar <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>
        <p id="lock-msg" style="color: var(--error); font-size: 0.8rem; text-align: center; margin-top: 10px;" class="hidden"></p>
    </div>

    <div id="form-section" class="hidden">
        <h2 id="titulo-nombre" class="capitalize-view">Paciente</h2>
        <p class="subtitle">Actualice la información reciente.</p>
        
        <div style="position: relative;">
            <h3><i class="fa-solid fa-user-pen"></i> Identidad del Niño</h3>
            <button class="btn-edit-inline" onclick="habilitarEdicion('nino')" title="Editar datos niño">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
        </div>

        <div class="field">
            <label>Primer Nombre</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user main-icon"></i>
                <input type="text" id="upd-n1" class="capitalize-view group-nino" disabled>
            </div>
        </div>
        <div class="field">
            <label>Segundo Nombre</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user main-icon"></i>
                <input type="text" id="upd-n2" class="capitalize-view group-nino" disabled>
            </div>
        </div>
        <div class="field">
            <label>Primer Apellido</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user-tag main-icon"></i>
                <input type="text" id="upd-a1" class="capitalize-view group-nino" disabled>
            </div>
        </div>
        <div class="field">
            <label>Segundo Apellido</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user-tag main-icon"></i>
                <input type="text" id="upd-a2" class="capitalize-view group-nino" disabled>
            </div>
        </div>

        <div class="field">
            <label>Fecha de Nacimiento</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-calendar main-icon"></i>
                <input type="date" id="upd-fecha" onchange="validarEdadManual()">
            </div>
        </div>

        <div id="div-cedula" class="field hidden">
            <label>Cédula del Niño</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-fingerprint main-icon"></i>
                <input type="text" id="upd-cedula">
            </div>
        </div>

        <div class="field">
            <label>Género</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-venus-mars main-icon"></i>
                <select id="upd-genero">
                    <option value="M">Masculino</option>
                    <option value="F">Femenino</option>
                </select>
            </div>
        </div>

        <h3><i class="fa-solid fa-location-dot"></i> Ubicación</h3>
        <div class="field">
            <label>Municipio</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-map main-icon"></i>
                <select id="upd-mun" onchange="cargarParroquias()"></select>
            </div>
        </div>
        <div class="field">
            <label>Parroquia</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-map-pin main-icon"></i>
                <select id="upd-par"></select>
            </div>
        </div>
        <div class="field">
            <label>Sector / Barrio</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-house main-icon"></i>
                <input type="text" id="upd-sec" class="capitalize-view">
            </div>
        </div>

        <h3><i class="fa-solid fa-stethoscope"></i> Salud y Social</h3>
        <div class="field">
            <label>Diagnóstico Principal</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-notes-medical main-icon"></i>
                <select id="upd-diag-p"></select>
            </div>
        </div>
        <div class="field">
            <label>Otros Diagnósticos / Observaciones</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-comment-medical main-icon"></i>
                <textarea id="upd-diag-o" placeholder="Indique otros problemas de salud"></textarea>
            </div>
        </div>

        <div class="field">
            <label>¿Visto por Fisiatría?</label>
            <div class="radio-group">
                <label><input type="radio" name="fisiatria" value="true"> SÍ</label>
                <label><input type="radio" name="fisiatria" value="false" checked> NO</label>
            </div>
        </div>

        <div class="field">
            <label>¿Está escolarizado?</label>
            <div class="radio-group">
                <label><input type="radio" name="escolarizado" value="true"> SÍ</label>
                <label><input type="radio" name="escolarizado" value="false" checked> NO</label>
            </div>
        </div>

        <h3><i class="fa-solid fa-wheelchair"></i> Movilidad</h3>
        <div class="field">
            <label>¿Camina Independiente?</label>
            <div class="radio-group">
                <label><input type="radio" name="camina" value="true" onchange="toggleTraslado()"> SÍ</label>
                <label><input type="radio" name="camina" value="false" checked onchange="toggleTraslado()"> NO</label>
            </div>
        </div>

        <div id="div-traslado" class="field">
            <label>Equipo de traslado</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-truck-ramp-box main-icon"></i>
                <select id="upd-equipo">
                    <option value="NINGUNO">Ninguno (Lo cargan / Brazos)</option>
                    <option value="SILLA DE RUEDAS">Silla de Ruedas</option>
                    <option value="ANDADERA">Andadera / Caminador</option>
                    <option value="COCHE ORTOPÉDICO">Coche Ortopédico</option>
                    <option value="MULETAS-BASTON">Muletas o Bastón</option>
                    <option value="OTRO">Otro equipo</option>
                </select>
            </div>
        </div>

        <div style="position: relative; margin-top: 40px;">
            <h3><i class="fa-solid fa-user-shield"></i> Datos del Representante</h3>
            <button class="btn-edit-inline" onclick="habilitarEdicion('rep')" title="Editar datos representante">
                <i class="fa-solid fa-pen-to-square"></i>
            </button>
        </div>

        <div class="field">
            <label>Nombre(s) Representante</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user main-icon"></i>
                <input type="text" id="rep-nombre" class="capitalize-view group-rep" disabled>
            </div>
        </div>
        <div class="field">
            <label>Apellido(s) Representante</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-user-tag main-icon"></i>
                <input type="text" id="rep-apellido" class="capitalize-view group-rep" disabled>
            </div>
        </div>
        <div class="field">
            <label>Cédula Representante</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-id-card main-icon"></i>
                <input type="text" id="rep-cedula" class="group-rep" disabled>
            </div>
        </div>
        <div class="field">
            <label>Teléfono de Contacto</label>
            <div class="phone-group">
                <select id="rep-cod" class="group-rep" disabled>
                    <option value="412">0412</option>
                    <option value="424">0424</option>
                    <option value="414">0414</option>
                    <option value="426">0426</option>
                    <option value="416">0416</option>
                </select>
                <input type="number" id="rep-num" class="group-rep" disabled oninput="if(this.value.length > 7) this.value = this.value.slice(0, 7);">
            </div>
        </div>

        <div class="field">
            <label>Teléfono Alternativo (Opcional)</label>
            <div class="phone-group">
                <select id="rep-cod-alt" class="group-rep" disabled>
                    <option value="412">0412</option>
                    <option value="424">0424</option>
                    <option value="414">0414</option>
                    <option value="426">0426</option>
                    <option value="416">0416</option>
                </select>
                <input type="number" id="rep-num-alt" class="group-rep" disabled oninput="if(this.value.length > 7) this.value = this.value.slice(0, 7);">
            </div>
        </div>

        <div class="field">
            <label>Cambiar Contraseña (Opcional)</label>
            <div class="input-wrapper">
                <i class="fa-solid fa-key main-icon"></i>
                <input type="password" id="upd-new-pass" placeholder="Mantener Actual" onkeydown="if(event.keyCode==32) return false;">
                <i class="fa-solid fa-eye toggle-pass" id="eye-icon-upd" onclick="togglePasswordVisibility('upd-new-pass', 'eye-icon-upd')"></i>
            </div>
        </div>

        <button class="btn-main btn-save" id="btn-guardar" onclick="guardarDatos()">Guardar Cambios <i class="fa-solid fa-cloud-arrow-up"></i></button>
        
        <button class="btn-main btn-exit" id="btn-salir" onclick="cerrarSesion()">Cerrar Sesión <i class="fa-solid fa-right-from-bracket"></i></button>
    </div>
</div>

<script>
    const _URL = 'https://gedeqtoowqevjvbjrenr.supabase.co';
    const _KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdlZGVxdG9vd3Fldmp2YmpyZW5yIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3NjAzODAsImV4cCI6MjA4NzMzNjM4MH0.fArL01V5XRQWpSxSDj1Ds9YKYcLBAxKLskc7osXcBpQ';
    const supabaseClient = supabase.createClient(_URL, _KEY);

    let pacienteActual = null;
    let intentosFallidos = 0;
    let timerInactividad;

    // --- LÓGICA DE PERSISTENCIA (SESSION STORAGE) E INACTIVIDAD ---

    window.onload = function() {
        // Usamos sessionStorage: se borra al cerrar la pestaña
        const sesionGuardada = sessionStorage.getItem('sesion_paciente');
        if (sesionGuardada) {
            pacienteActual = JSON.parse(sesionGuardada);
            cargarDatosEnFormulario(pacienteActual);
            iniciarControlInactividad();
        }
    };

    function iniciarControlInactividad() {
        const reiniciarTimer = () => {
            clearTimeout(timerInactividad);
            // 10 minutos = 600,000 milisegundos
            timerInactividad = setTimeout(() => {
                mostrarToast("Sesión expirada por inactividad");
                setTimeout(cerrarSesion, 2000);
            }, 600000); 
        };

        // Detectar cualquier movimiento o pulsación para resetear el tiempo
        window.onmousemove = reiniciarTimer;
        window.onkeydown = reiniciarTimer;
        window.onclick = reiniciarTimer;
        window.onscroll = reiniciarTimer;
        reiniciarTimer();
    }

    function cerrarSesion() {
        sessionStorage.removeItem('sesion_paciente');
        location.reload();
    }

    // --- FUNCIONES DE ACCESO ---

    async function validarAcceso() {
        const btn = document.getElementById('btn-entrar');
        const dni = document.getElementById('login-dni').value.trim();
        const historia = document.getElementById('login-historia').value.trim();
        const passRaw = document.getElementById('login-pass').value;
        const passPlana = passRaw.replace(/\s/g, '');

        if(!dni || !historia || !passPlana) return mostrarToast("Complete los campos requeridos.");

        const originalContent = btn.innerHTML; 
        btn.disabled = true;
        btn.innerHTML = 'Accediendo... <i class="fa-solid fa-circle-notch fa-spin"></i>';

        try {
            const passHash = await generarHash(passPlana);
            const { data, error } = await supabaseClient.from('pacientes').select('*')
                .eq('dni_padre', dni).eq('id_historia', parseInt(historia)).eq('password', passHash).maybeSingle();

            if (data) {
                pacienteActual = data;
                // Guardamos en sesión
                sessionStorage.setItem('sesion_paciente', JSON.stringify(data));
                cargarDatosEnFormulario(data);
                iniciarControlInactividad();
            } else {
                intentosFallidos++;
                if (intentosFallidos >= 5) bloquearLogin();
                else {
                    mostrarToast("Datos incorrectos. Intente de nuevo.");
                    btn.disabled = false;
                    btn.innerHTML = originalContent; 
                }
            }
        } catch (err) {
            mostrarToast("Error de conexión");
            btn.disabled = false;
            btn.innerHTML = originalContent;
        }
    }

    function mostrarToast(mensaje, tipo = 'error') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast ${tipo}`;
        toast.innerHTML = `<i class="fa-solid ${tipo === 'error' ? 'fa-circle-exclamation' : 'fa-circle-check'}"></i> <span>${mensaje}</span>`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 400); }, 3500);
    }

    function aNombrePropio(texto) { return texto ? texto.toLowerCase().split(' ').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join(' ') : ""; }

    async function generarHash(password) {
        const cleanPass = password.replace(/\s/g, '');
        const msgUint8 = new TextEncoder().encode(cleanPass);
        const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
        return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    function togglePasswordVisibility(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        if (input.type === "password") { input.type = "text"; icon.classList.replace('fa-eye', 'fa-eye-slash'); }
        else { input.type = "password"; icon.classList.replace('fa-eye-slash', 'fa-eye'); }
    }

    // --- LÓGICA DE FORMULARIO ---

    function inicializarSelects() {
        const selectDiag = document.getElementById('upd-diag-p');
        selectDiag.innerHTML = '<option value="">Seleccione Diagnóstico</option>';
        listaDiagnosticos.sort().forEach(diag => {
            const opt = document.createElement('option');
            opt.value = diag.toUpperCase();
            opt.textContent = diag;
            selectDiag.appendChild(opt);
        });

        const selectMun = document.getElementById('upd-mun');
        selectMun.innerHTML = '<option value="">Seleccione Municipio</option>';
        Object.keys(datosZulia).sort().forEach(m => selectMun.innerHTML += `<option value="${m}">${m}</option>`);
    }

    function cargarParroquias() {
        const mun = document.getElementById('upd-mun').value;
        const selectPar = document.getElementById('upd-par');
        selectPar.innerHTML = '';
        if(datosZulia[mun]) datosZulia[mun].sort().forEach(p => selectPar.innerHTML += `<option value="${p}">${p}</option>`);
    }

    function habilitarEdicion(grupo) {
        const clase = grupo === 'nino' ? '.group-nino' : '.group-rep';
        document.querySelectorAll(clase).forEach(el => el.disabled = !el.disabled);
    }

    function validarEdadManual() {
        const fecha = document.getElementById('upd-fecha').value;
        if (!fecha) return;
        const edad = new Date().getFullYear() - new Date(fecha).getFullYear();
        document.getElementById('div-cedula').classList.toggle('hidden', edad < 9);
    }

    function toggleTraslado() {
        const camina = document.querySelector('input[name="camina"]:checked')?.value === "true";
        document.getElementById('div-traslado').classList.toggle('hidden', camina);
    }

    function cargarDatosEnFormulario(data) {
        document.getElementById('login-section').classList.add('hidden');
        document.getElementById('form-section').classList.remove('hidden');
        document.getElementById('form-section').classList.add('fade');
        
        document.getElementById('titulo-nombre').innerText = aNombrePropio(`${data.nombre1 || ''} ${data.apellido1 || ''}`);
        document.getElementById('upd-n1').value = aNombrePropio(data.nombre1);
        document.getElementById('upd-n2').value = aNombrePropio(data.nombre2);
        document.getElementById('upd-a1').value = aNombrePropio(data.apellido1);
        document.getElementById('upd-a2').value = aNombrePropio(data.apellido2);
        document.getElementById('upd-fecha').value = data.fecha_nacimiento || '';
        document.getElementById('upd-cedula').value = data.cedula_nino || '';
        document.getElementById('upd-genero').value = data.genero ? data.genero.toUpperCase() : 'M';
        document.getElementById('rep-nombre').value = aNombrePropio(data.nombre_representante);
        document.getElementById('rep-apellido').value = aNombrePropio(data.apellido_representante);
        document.getElementById('rep-cedula').value = data.dni_padre;
        
        // Manejo de teléfonos
        if (data.telefono_contacto) {
            let telStr = String(data.telefono_contacto).replace('58', '');
            if (telStr.length === 10) {
                document.getElementById('rep-cod').value = telStr.slice(0, 3);
                document.getElementById('rep-num').value = telStr.slice(3);
            }
        }

        inicializarSelects();

        // Cargar ubicación
        if (data.municipio) {
            const munFormat = Object.keys(datosZulia).find(m => m.toUpperCase() === data.municipio.toUpperCase());
            if(munFormat){
                document.getElementById('upd-mun').value = munFormat;
                cargarParroquias();
                const parFormat = datosZulia[munFormat].find(p => p.toUpperCase() === data.parroquia.toUpperCase());
                if (parFormat) document.getElementById('upd-par').value = parFormat;
            }
        }
        
        document.getElementById('upd-sec').value = aNombrePropio(data.sector);
        if (data.diagnostico_principal) document.getElementById('upd-diag-p').value = data.diagnostico_principal.toUpperCase();
        document.getElementById('upd-diag-o').value = data.otros_diagnosticos || '';

        const marcarRadio = (name, val) => document.getElementsByName(name).forEach(r => r.checked = (r.value === String(val)));
        marcarRadio('escolarizado', data.escolarizado);
        marcarRadio('fisiatria', data.vio_fisiatria);
        marcarRadio('camina', data.camina_independiente);
        
        if (data.equipo_traslado) document.getElementById('upd-equipo').value = data.equipo_traslado;
        validarEdadManual();
        toggleTraslado();
    }

    async function guardarDatos() {
        const btn = document.getElementById('btn-guardar');
        const munVal = document.getElementById('upd-mun').value;
        const diagVal = document.getElementById('upd-diag-p').value;
        
        if(!munVal || !diagVal) return mostrarToast("Complete los campos de ubicación y diagnóstico.");

        btn.disabled = true;
        btn.innerHTML = 'Guardando... <i class="fa-solid fa-spinner fa-spin"></i>';

        const updates = {
            nombre1: document.getElementById('upd-n1').value.trim().toUpperCase(),
            nombre2: document.getElementById('upd-n2').value.trim().toUpperCase() || null,
            apellido1: document.getElementById('upd-a1').value.trim().toUpperCase(),
            apellido2: document.getElementById('upd-a2').value.trim().toUpperCase() || null,
            fecha_nacimiento: document.getElementById('upd-fecha').value,
            cedula_nino: document.getElementById('upd-cedula').value || null,
            genero: document.getElementById('upd-genero').value,
            municipio: munVal.toUpperCase(),
            parroquia: document.getElementById('upd-par').value.toUpperCase(),
            sector: document.getElementById('upd-sec').value.trim().toUpperCase() || null,
            diagnostico_principal: diagVal,
            otros_diagnosticos: document.getElementById('upd-diag-o').value.trim().toUpperCase() || null,
            vio_fisiatria: document.querySelector('input[name="fisiatria"]:checked').value === "true",
            camina_independiente: document.querySelector('input[name="camina"]:checked').value === "true",
            escolarizado: document.querySelector('input[name="escolarizado"]:checked').value === "true",
            equipo_traslado: document.getElementById('upd-equipo').value,
            actualizado: true,
            ultima_edicion: new Date()
        };

        const newPass = document.getElementById('upd-new-pass').value.replace(/\s/g, '');
        if (newPass !== "") updates.password = await generarHash(newPass);

        const { error } = await supabaseClient.from('pacientes').update(updates).eq('id_historia', pacienteActual.id_historia);

        if (!error) { 
            mostrarToast("¡Datos guardados!", "success");
            sessionStorage.setItem('sesion_paciente', JSON.stringify({...pacienteActual, ...updates}));
            btn.disabled = false;
            btn.innerHTML = 'Guardar Cambios <i class="fa-solid fa-cloud-arrow-up"></i>';
            document.querySelectorAll('.group-nino, .group-rep').forEach(el => el.disabled = true);
        } else { 
            mostrarToast("Error: " + error.message);
            btn.disabled = false;
            btn.innerHTML = 'Guardar Cambios <i class="fa-solid fa-cloud-arrow-up"></i>';
        }
    }

    function bloquearLogin() {
        const btn = document.getElementById('btn-entrar');
        const msg = document.getElementById('lock-msg');
        btn.disabled = true;
        let seg = 60;
        const int = setInterval(() => {
            seg--;
            msg.innerText = `Bloqueado por seguridad. Espere ${seg}s.`;
            msg.classList.remove('hidden');
            if (seg <= 0) { clearInterval(int); btn.disabled = false; msg.classList.add('hidden'); intentosFallidos = 0; }
        }, 1000);
    }
